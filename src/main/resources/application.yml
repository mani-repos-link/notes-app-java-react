server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/notes;AUTO_SERVER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
  h2:
    console:
      enabled: true
